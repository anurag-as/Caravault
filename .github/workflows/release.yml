name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag to simulate (e.g. v1.0.0-test)'
        required: true
        default: 'v1.0.0-test'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Cache CMake dependencies
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: cmake-deps-${{ runner.os }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: cmake-deps-${{ runner.os }}-

      # ── Linux dependencies ──────────────────────────────────────────────
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libsqlite3-dev libssl-dev rpm

      # ── Windows dependencies (vcpkg) ────────────────────────────────────
      - name: Cache vcpkg packages (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: C:\vcpkg\installed
          key: vcpkg-${{ runner.os }}-sqlite3-openssl
          restore-keys: vcpkg-${{ runner.os }}-

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          vcpkg install sqlite3:x64-windows openssl:x64-windows
          echo "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" >> $env:GITHUB_ENV

      # ── Configure ───────────────────────────────────────────────────────
      - name: Configure (macOS/Linux)
        if: runner.os != 'Windows'
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: |
          cmake -S . -B build `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows

      # ── Build ────────────────────────────────────────────────────────────
      - name: Build (macOS/Linux)
        if: runner.os != 'Windows'
        run: cmake --build build

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: cmake --build build --config Release

      # ── Package ──────────────────────────────────────────────────────────
      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: cp build/caravault caravault-${{ github.ref_name }}-macos

      - name: Package (Linux)
        if: runner.os == 'Linux'
        working-directory: build
        run: |
          strip caravault
          cpack

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: cp build\Release\caravault.exe caravault-${{ github.ref_name }}-windows-x64.exe

      # ── Collect artifacts ─────────────────────────────────────────────
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: package-${{ matrix.os }}
          path: |
            caravault-*-macos
            caravault-*-windows-x64.exe
            build/*.deb
            build/*.rpm
          if-no-files-found: error

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Caravault ${{ github.ref_name }}
          body: |
            ## Caravault ${{ github.ref_name }}

            ### Install

            | Platform | File |
            |----------|------|
            | macOS    | binary — `sudo mv caravault-*-macos /usr/local/bin/caravault && chmod +x /usr/local/bin/caravault` |
            | Linux (Debian/Ubuntu) | `.deb` — `sudo dpkg -i caravault-*.deb` |
            | Linux (Fedora/RHEL)   | `.rpm` — `sudo rpm -i caravault-*.rpm` |
            | Windows  | `.exe` — add it to PATH |
          files: artifacts/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

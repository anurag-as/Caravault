name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag to simulate (e.g. v1.0.0-test)'
        required: true
        default: 'v1.0.0-test'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Linux ────────────────────────────────────────────────────────────────
  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache CMake dependencies
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: cmake-deps-linux-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: cmake-deps-linux-

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libsqlite3-dev libssl-dev rpm

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Resolve tag name
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Package
        run: |
          strip build/caravault
          cp build/caravault caravault-${{ steps.tag.outputs.name }}-linux-x86_64
          cd build && cpack --config CPackConfig.cmake

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: package-linux
          path: |
            caravault-*-linux-x86_64
            build/*.deb
            build/*.rpm
          if-no-files-found: error

  # ── macOS x86_64 (Intel) ─────────────────────────────────────────────────
  build-macos-x86_64:
    name: Build (macOS x86_64)
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - name: Cache CMake dependencies
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: cmake-deps-macos-x86_64-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: cmake-deps-macos-x86_64-

      - name: Install dependencies
        run: brew install openssl sqlite

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES=x86_64

      - name: Build
        run: cmake --build build --config Release

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: macos-x86_64
          path: build/caravault
          if-no-files-found: error

  # ── macOS arm64 (Apple Silicon) ──────────────────────────────────────────
  build-macos-arm64:
    name: Build (macOS arm64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache CMake dependencies
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: cmake-deps-macos-arm64-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: cmake-deps-macos-arm64-

      - name: Install dependencies
        run: brew install openssl sqlite

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES=arm64

      - name: Build
        run: cmake --build build --config Release

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: build/caravault
          if-no-files-found: error

  # ── macOS universal binary ───────────────────────────────────────────────
  build-macos-universal:
    name: Build (macOS universal)
    needs: [build-macos-x86_64, build-macos-arm64]
    runs-on: macos-latest
    steps:
      - name: Resolve tag name
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download x86_64 binary
        uses: actions/download-artifact@v4
        with:
          name: macos-x86_64
          path: macos-x86_64

      - name: Download arm64 binary
        uses: actions/download-artifact@v4
        with:
          name: macos-arm64
          path: macos-arm64

      - name: Create universal binary
        run: |
          lipo -create -output caravault-${{ steps.tag.outputs.name }}-macos-universal \
            macos-x86_64/caravault \
            macos-arm64/caravault
          chmod +x caravault-${{ steps.tag.outputs.name }}-macos-universal
          lipo -info caravault-${{ steps.tag.outputs.name }}-macos-universal

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: package-macos
          path: caravault-*-macos-universal
          if-no-files-found: error

  # ── Windows ──────────────────────────────────────────────────────────────
  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache CMake dependencies
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: cmake-deps-windows-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: cmake-deps-windows-

      - name: Cache vcpkg packages
        uses: actions/cache@v4
        with:
          path: C:\vcpkg\installed
          key: vcpkg-windows-sqlite3-openssl
          restore-keys: vcpkg-windows-

      - name: Install dependencies
        run: |
          vcpkg install sqlite3:x64-windows openssl:x64-windows
          echo "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" >> $env:GITHUB_ENV

      - name: Configure
        run: |
          cmake -S . -B build `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows

      - name: Build
        run: cmake --build build --config Release

      - name: Resolve tag name
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Package
        run: cp build\Release\caravault.exe caravault-${{ steps.tag.outputs.name }}-windows-x64.exe

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: package-windows
          path: caravault-*-windows-x64.exe
          if-no-files-found: error

  # ── Release ──────────────────────────────────────────────────────────────
  release:
    name: Publish Release
    needs: [build-linux, build-macos-universal, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Resolve tag name
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: Caravault ${{ steps.tag.outputs.name }}
          body: |
            ## Caravault ${{ steps.tag.outputs.name }}

            ### Install

            | Platform | File |
            |----------|------|
            | macOS (Intel + Apple Silicon) | binary — `sudo install -m 755 caravault-*-macos-universal /usr/local/bin/caravault` |
            | Linux x86_64 | binary — `sudo install -m 755 caravault-*-linux-x86_64 /usr/local/bin/caravault` |
            | Linux (Debian/Ubuntu) | `.deb` — `sudo dpkg -i caravault-*.deb` |
            | Linux (Fedora/RHEL)   | `.rpm` — `sudo rpm -i caravault-*.rpm` |
            | Windows x64 | `.exe` — add to PATH |
          files: artifacts/*
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.name, '-') }}
